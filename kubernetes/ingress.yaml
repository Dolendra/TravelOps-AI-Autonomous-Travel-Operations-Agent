apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: travelops-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
  - http:
      paths:
      # Route all API and metrics paths to backend
      - path: /api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: travelops-backend-service
            port:
              number: 8000
      - path: /metrics
        pathType: Exact
        backend:
          service:
            name: travelops-backend-service
            port:
              number: 8000
      - path: /health
        pathType: Exact
        backend:
          service:
            name: travelops-backend-service
            port:
              number: 8000
      # Route UI traffic to Nginx frontend
      - path: /(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: travelops-frontend-service
            port:
              number: 80
