apiVersion: apps/v1
kind: Deployment
metadata:
  name: travelops-frontend
  namespace: default
  labels:
    app: travelops-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: travelops-frontend
  template:
    metadata:
      labels:
        app: travelops-frontend
    spec:
      containers:
      - name: frontend
        image: travelops-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "0.5"
            memory: 256Mi
          requests:
            cpu: "0.2"
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
