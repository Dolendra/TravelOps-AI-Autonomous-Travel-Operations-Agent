apiVersion: apps/v1
kind: Deployment
metadata:
  name: travelops-frontend
  labels:
    app: travelops-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: travelops-frontend
  template:
    metadata:
      labels:
        app: travelops-frontend
    spec:
      containers:
      - name: frontend
        image: travelops-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: travelops-frontend-service
spec:
  selector:
    app: travelops-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: LoadBalancer
